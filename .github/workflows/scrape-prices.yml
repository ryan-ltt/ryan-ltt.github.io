name: Scrape grocery prices

on:
  schedule:
    # Thursday 11:00 UTC (~7am ET) — new weekly flyers are usually up by then
    - cron: "0 11 * * 4"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests firebase-admin

      - name: Scrape Flipp → Firestore
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GROCERYPAL_POSTAL_CODES: ${{ vars.GROCERYPAL_POSTAL_CODES }}
        run: python grocerypal/fetch-prices.py
