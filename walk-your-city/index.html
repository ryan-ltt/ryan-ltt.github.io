<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>walk your city</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/projects/projects.css">
    <link rel="stylesheet" href="walk-your-city.css">
</head>
<body>
    <header>
        <h1>walk your city</h1>
        <nav class="nav-buttons">
            <a href="/" class="button">home</a>
            <a href="/projects/" class="button">projects</a>
            <div id="authBar" style="display:inline-flex;align-items:center;gap:8px;">
                <span id="authEmail" style="display:none;font-size:0.85em;opacity:0.7"></span>
                <button class="button" id="signOutBtn" style="display:none">sign out</button>
                <button class="button" id="signInBtn">sign in</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="io-bar">
            <select id="citySelect" class="city-select">
                <option value="toronto">Toronto</option>
                <option value="vancouver">Vancouver</option>
                <option value="montreal">Montréal</option>
                <option value="padova">Padova</option>
                <option value="ajax">Ajax</option>
                <option value="mississauga">Mississauga</option>
                <option value="brampton">Brampton</option>
                <option value="vaughan">Vaughan</option>
                <option value="markham">Markham</option>
                <option value="richmond_hill">Richmond Hill</option>
                <option value="hamilton">Hamilton</option>
                <option value="burlington">Burlington</option>
                <option value="oakville">Oakville</option>
                <option value="oshawa">Oshawa</option>
                <option value="whitby">Whitby</option>
                <option value="pickering">Pickering</option>
                <option value="newmarket">Newmarket</option>
            </select>
            <label class="button" style="cursor:pointer;">
                import json
                <input type="file" id="importInput" accept=".json,application/json" style="display:none">
            </label>
            <button class="button" id="exportBtn">export json</button>
            <label class="button" style="cursor:pointer;">
                import strava
                <input type="file" id="stravaInput" accept=".gpx,.tcx" style="display:none">
            </label>
            <button class="button" id="resetBtn">reset data</button>
            <span id="statusLine" class="status-line"></span>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" id="tabMarkBtn">mark walks</button>
            <button class="tab-btn" id="tabHistoryBtn">history</button>
            <button class="tab-btn" id="tabRouteBtn">generate route</button>
        </div>

        <!-- Tab: mark walks -->
        <div id="tabMark" class="tab-pane">
            <div class="date-row">
                <label class="date-label">walking on</label>
                <input type="date" id="activeDateInput" class="date-input">
            </div>
            <div class="map-layout" id="mapLayoutMark">
                <div id="map"></div>
                <div id="gpsStatsOverlay">
                    <div class="gps-stat-block">
                        <div class="gps-stat-value" id="gpsStatWays">0</div>
                        <div class="gps-stat-label">ways claimed</div>
                    </div>
                    <div class="gps-stat-block">
                        <div class="gps-stat-value" id="gpsStatKm">0.0</div>
                        <div class="gps-stat-label">km walked</div>
                    </div>
                    <div class="gps-stat-block">
                        <div class="gps-stat-value" id="gpsStatStreets">0</div>
                        <div class="gps-stat-label">new streets</div>
                    </div>
                </div>
                <div id="sidePanel">
                    <div class="street-search-wrap">
                        <div class="street-search-row">
                            <input type="text" id="streetSearch" placeholder="filter streets..." class="street-search-input">
                            <label class="street-search-map-label">
                                <input type="checkbox" id="streetSearchShowOnMap"> show
                            </label>
                        </div>
                        <div class="walked-filter-toggle">
                            <button class="walked-filter-btn walked-filter-btn--active" data-filter="all">all</button>
                            <button class="walked-filter-btn" data-filter="some">started</button>
                            <button class="walked-filter-btn" data-filter="full">completed</button>
                        </div>
                    </div>
                    <div id="sideList"></div>
                </div>
            </div>
        </div>

        <!-- Tab: generate route -->
        <div id="tabRoute" class="tab-pane" style="display:none">
            <div class="map-layout" id="mapLayoutRoute">
                <div id="mapRoute"></div>
                <div id="sidePanelRoute">
                    <div id="sideListRoute"></div>
                </div>
            </div>
            <div class="route-controls-row" style="margin-top:8px">
                <input type="text" id="routeAddressInput" class="street-search-input route-address-input" placeholder="start address (or click map)">
                <button class="button" id="routeGeocodeBtn">find</button>
            </div>
            <div class="route-controls-row">
                <label class="route-label">distance</label>
                <input type="number" id="routeDistanceInput" class="date-input route-distance-input" value="5" min="0.5" max="50" step="0.5">
                <span class="route-label">km</span>
                <span class="route-label" id="routeTimeLabel">~1h 0m</span>
                <label class="route-label"><input type="checkbox" id="routeLoopToggle" checked> loop</label>
                <button class="button" id="routeGenerateBtn">generate</button>
                <button class="button" id="routeExportGpxBtn" style="display:none">download gpx</button>
            </div>
            <div class="route-controls-row">
                <button class="button" id="routeAddPinBtn">add pin</button>
                <button class="button" id="routeClearPinsBtn" style="display:none">clear pins</button>
                <label class="route-label" id="routePinsOrderedLabel" style="display:none"><input type="checkbox" id="routePinsOrderedToggle"> ordered</label>
                <span class="route-label" id="routePinCount" style="display:none"></span>
            </div>
            <div class="route-controls-row">
                <span class="status-line" id="routeStatus"></span>
            </div>
            <div class="route-legend">
                <span class="route-legend-swatch" style="background:#7c3aed"></span> new street
                <span class="route-legend-swatch" style="background:#f43f5e; margin-left:12px"></span> already walked
                <span class="route-legend-swatch" style="background:#16a34a; margin-left:12px"></span> your walks
                <span class="route-legend-swatch route-legend-swatch--pin" style="background:#2563eb; margin-left:12px"></span> pin
            </div>
        </div>

        <!-- Tab: history -->
        <div id="tabHistory" class="tab-pane" style="display:none">
            <div class="date-row">
                <label class="date-label">view day</label>
                <input type="date" id="historyDateInput" class="date-input">
                <span id="historyStatus" class="status-line"></span>
            </div>
            <div class="map-layout" id="mapLayoutHistory">
                <div id="mapHistory"></div>
                <div id="sidePanelHistory">
                    <div id="sideListHistory"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="signInModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center">
        <div style="background:#1e293b;padding:24px;border-radius:8px;min-width:300px;display:flex;flex-direction:column;gap:12px;">
            <h3 style="margin:0" id="authModalTitle">sign in</h3>
            <input type="email" id="signInEmail" placeholder="email" class="street-search-input">
            <input type="password" id="signInPassword" placeholder="password" class="street-search-input">
            <span id="authModalError" style="display:none;color:#f87171;font-size:0.85em"></span>
            <button class="button" id="submitAuthBtn">sign in</button>
            <button class="button" id="toggleAuthModeBtn" style="opacity:0.7">no account? sign up</button>
            <button class="button" id="closeSignInBtn">cancel</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="supabase.min.js"></script>
    <script src="walk-your-city.js"></script>
</body>
</html>
